name: Linux build and runtime smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ubuntu:
    name: Debian/Ubuntu
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache-dependency-path: sidecar/go.sum
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev xvfb zip python3
      - uses: ./.github/actions/linux-build
        with:
          version: ${{ github.ref_name }}
          upload-artifact: 'true'

  container:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Fedora
            container: fedora:42
            install: >-
              dnf install -y gcc gcc-c++ make perl pkgconf-pkg-config gtk3-devel
              webkit2gtk4.1-devel libayatana-appindicator-gtk3-devel
              xorg-x11-server-Xvfb zip python3 git curl && dnf clean all
          - name: Arch
            container: archlinux:latest
            install: >-
              pacman -Syu --noconfirm --needed base-devel pkgconf gtk3 webkit2gtk-4.1
              libayatana-appindicator git curl xorg-server-xvfb zip python
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache-dependency-path: sidecar/go.sum
      - name: Install native dependencies
        run: ${{ matrix.install }}
      - uses: ./.github/actions/linux-build
        with:
          version: ${{ github.ref_name }}
          upload-artifact: 'false'
